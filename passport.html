<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyChild Health Passport</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial, sans-serif; background: #F5F0E8;
         min-height: 100vh; padding: 16px; }
  .card { background: white; border-radius: 20px; padding: 24px;
          max-width: 480px; margin: 0 auto;
          box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .step { padding: 8px 12px; margin: 6px 0; border-radius: 8px;
          font-size: 13px; }
  .pending { background: #F5F0E8; color: #5A6360; }
  .ok      { background: #D4EDD4; color: #2A5A2A; }
  .fail    { background: #FCEAEA; color: #A04230; }
  .header  { background: #1C2320; border-radius: 14px; padding: 20px;
             margin-bottom: 20px; color: white; }
  .section { margin-bottom: 18px; }
  .section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
                   color: #8B938F; text-transform: uppercase; margin-bottom: 10px; }
  .info-row { display: flex; justify-content: space-between;
              padding: 8px 0; border-bottom: 1px solid #F0EDE6; }
  .info-label { font-size: 13px; color: #5A6360; }
  .info-value { font-size: 13px; font-weight: 600; color: #1C2320; }
  .v-item { display: flex; align-items: center; gap: 10px;
            padding: 8px 0; border-bottom: 1px solid #F0EDE6; }
  .v-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .v-name { font-size: 13px; color: #1C2320; flex: 1; }
  .v-badge { font-size: 11px; font-weight: 600; padding: 2px 8px;
             border-radius: 10px; }
  .done    { background: #D4EDD4; color: #2A5A2A; }
  .overdue { background: #FCEAEA; color: #A04230; }
  .stats   { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .stat    { flex: 1; min-width: 60px; background: #F5F0E8; border-radius: 10px;
             padding: 10px; text-align: center; }
  .stat-num { font-size: 20px; font-weight: 800; color: #1C2320; }
  .stat-lbl { font-size: 10px; color: #8B938F; margin-top: 2px; }
  .progress-bar { background: #F0EDE6; border-radius: 4px; height: 6px;
                  margin-top: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1D9E75; border-radius: 4px; }
  .footer { text-align: center; font-size: 11px; color: #8B938F;
            margin-top: 20px; padding-top: 16px; border-top: 1px solid #F0EDE6; }
  .app-name { font-size: 20px; font-weight: 800; }
  .app-sub  { font-size: 11px; color: rgba(255,255,255,0.5); }
  .child-name { font-size: 26px; font-weight: 800; margin-top: 12px; }
  .child-meta { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 4px; }
  .badge { display:inline-block; background:#1D9E75; color:white; font-size:11px;
           padding:3px 10px; border-radius:20px; margin-top:8px; }
</style>
</head>
<body>
<div class="card">
  <div id="status">
    <div class="step pending" id="s1">⏳ Starting...</div>
  </div>
  <div id="content"></div>
  <div class="footer">
    Generated by MyChild App · Valid for 30 minutes<br>
    <a href="https://ssatish01-afk.github.io/mychild-app/privacy_policy.html"
       style="color:#1D9E75;">Privacy Policy</a>
  </div>
</div>

<script type="module">
  const status  = document.getElementById('status');
  const content = document.getElementById('content');

  function step(id, text, type) {
    const el = document.getElementById(id) || document.createElement('div');
    el.id = id;
    el.className = `step ${type}`;
    el.textContent = text;
    if (!document.getElementById(id)) status.appendChild(el);
  }

  try {
    // Step 1 — Get token
    step('s1', '✓ Page loaded', 'ok');
    const params = new URLSearchParams(window.location.search);
    let raw = params.get('t');
    if (!raw) { step('s2','✗ No token in URL','fail'); throw new Error('no_token'); }

    let token = raw;
    try { const p = JSON.parse(raw); token = p.token || raw; } catch(_) {}
    step('s2', `✓ Token: ${token.substring(0,20)}...`, 'ok');

    // Step 2 — Load Firebase
    step('s3','⏳ Loading Firebase...','pending');
    const { initializeApp } = await import(
      'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js');
    const { getAuth, signInAnonymously } = await import(
      'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js');
    const { getFirestore, doc, getDoc, collection, getDocs } = await import(
      'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js');

    const app = initializeApp({
      apiKey: "AIzaSyAYp9WpYrqOlGHcn6vcJEb7gxT91_HduPs",
      authDomain: "child-health-passport.firebaseapp.com",
      projectId: "child-health-passport",
      storageBucket: "child-health-passport.firebasestorage.app",
      messagingSenderId: "387891334117",
      appId: "1:387891334117:web:7ccdd29d94b0009c12fd0c"
    });
    step('s3','✓ Firebase loaded','ok');

    // Step 3 — Sign in anonymously
    step('s4','⏳ Authenticating...','pending');
    const auth = getAuth(app);
    await signInAnonymously(auth);
    step('s4','✓ Authenticated','ok');

    // Step 4 — Verify token
    step('s5','⏳ Verifying token...','pending');
    const db = getFirestore(app);
    const tokenDoc = await getDoc(doc(db, 'accessTokens', token));
    if (!tokenDoc.exists()) {
      step('s5','✗ Token not found in Firestore','fail');
      throw new Error('not_found');
    }
    const tokenData = tokenDoc.data();
    const expiresAt = tokenData.expiresAt?.toDate?.() || new Date(tokenData.expiresAt?.seconds * 1000);
    if (new Date() > expiresAt) {
      step('s5','✗ Token expired','fail');
      content.innerHTML = '<div class="step fail">⏰ QR code expired. Generate a new one from the app.</div>';
      throw new Error('expired');
    }
    step('s5',`✓ Token valid until ${expiresAt.toLocaleTimeString()}`, 'ok');

    // Step 5 — Load child
    step('s6','⏳ Loading child data...','pending');
    const childId  = tokenData.childId;
    const childDoc = await getDoc(doc(db, 'children', childId));
    if (!childDoc.exists()) {
      step('s6','✗ Child not found','fail');
      throw new Error('no_child');
    }
    const child = childDoc.data();
    step('s6',`✓ Child: ${child.fullName}`,'ok');

    // Step 6 — Load vaccines, growth, history in parallel
    step('s7','⏳ Loading health data...','pending');
    const [vaccSnap, growthSnap, histSnap] = await Promise.all([
      getDocs(collection(db, 'children', childId, 'vaccines')),
      getDocs(collection(db, 'children', childId, 'growthEntries')),
      getDocs(collection(db, 'children', childId, 'medicalHistory')),
    ]);

    const vaccines = [];
    vaccSnap.forEach(d => vaccines.push(d.data()));
    vaccines.sort((a,b) => (a.scheduledAgeMonths||0)-(b.scheduledAgeMonths||0));

    const growthList = [];
    growthSnap.forEach(d => growthList.push(d.data()));
    growthList.sort((a,b) => {
      const da = a.date?.seconds || 0;
      const db2 = b.date?.seconds || 0;
      return db2 - da;
    });

    const histList = [];
    histSnap.forEach(d => histList.push(d.data()));
    histList.sort((a,b) => {
      const da = a.date?.seconds || 0;
      const db2 = b.date?.seconds || 0;
      return db2 - da;
    });

    step('s7',`✓ ${vaccines.length} vaccines · ${growthList.length} growth · ${histList.length} history`,'ok');

    // Clear status and show passport
    status.style.display = 'none';

    // Build passport
    const dob    = child.dateOfBirth?.toDate?.() ||
                   new Date((child.dateOfBirth?.seconds||0)*1000);
    const ageMs  = Date.now() - dob.getTime();
    const yrs    = Math.floor(ageMs/(365.25*24*60*60*1000));
    const mos    = Math.floor((ageMs%(365.25*24*60*60*1000))/(30.44*24*60*60*1000));
    const ageStr = yrs > 0 ? `${yrs}y ${mos}m` : `${mos} months`;

    const done    = vaccines.filter(v=>v.status==='done').length;
    const overdue = vaccines.filter(v=>v.status==='overdue').length;
    const total   = vaccines.length;
    const pct     = total>0 ? Math.round(done/total*100) : 0;

    let html = `
    <div class="header">
      <div class="app-name">MyChild</div>
      <div class="app-sub">Health Passport</div>
      <div class="child-name">${child.fullName}</div>
      <div class="child-meta">${ageStr} · ${child.sex==='M'?'Boy':'Girl'}${child.bloodGroup?' · '+child.bloodGroup:''}</div>
      <div class="badge">✓ Verified</div>
    </div>

    <div class="section">
      <div class="section-title">Child Information</div>
      <div class="info-row"><span class="info-label">Full Name</span>
        <span class="info-value">${child.fullName}</span></div>
      <div class="info-row"><span class="info-label">Date of Birth</span>
        <span class="info-value">${dob.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</span></div>
      <div class="info-row"><span class="info-label">Age</span>
        <span class="info-value">${ageStr}</span></div>
      ${child.bloodGroup?`<div class="info-row"><span class="info-label">Blood Group</span>
        <span class="info-value">${child.bloodGroup}</span></div>`:''}
      <div class="info-row"><span class="info-label">ID</span>
        <span class="info-value" style="font-size:11px">${child.uniqueId||'—'}</span></div>
    </div>

    <div class="section">
      <div class="section-title">Immunisation</div>
      <div class="stats">
        <div class="stat"><div class="stat-num" style="color:#1D9E75">${done}</div><div class="stat-lbl">Given</div></div>
        <div class="stat"><div class="stat-num" style="color:#E88080">${overdue}</div><div class="stat-lbl">Overdue</div></div>
        <div class="stat"><div class="stat-num">${total-done-overdue}</div><div class="stat-lbl">Upcoming</div></div>
        <div class="stat"><div class="stat-num">${pct}%</div><div class="stat-lbl">Done</div></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>`;

    const doneVacc = vaccines.filter(v=>v.status==='done').slice(-8);
    if (doneVacc.length>0) {
      html += `<div style="margin-top:12px"><div class="section-title">Recently Given</div>`;
      doneVacc.forEach(v=>{
        const dt = v.completedDate?.seconds ?
          new Date(v.completedDate.seconds*1000).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
        html += `<div class="v-item">
          <div class="v-dot" style="background:#1D9E75"></div>
          <div class="v-name">${v.name}</div>
          <div style="font-size:11px;color:#8B938F">${dt}</div>
        </div>`;
      });
      html += '</div>';
    }
    if (overdue>0) {
      const ovList = vaccines.filter(v=>v.status==='overdue').slice(0,5);
      html += `<div style="margin-top:8px"><div class="section-title">Overdue (${overdue})</div>`;
      ovList.forEach(v=>{
        html += `<div class="v-item">
          <div class="v-dot" style="background:#E88080"></div>
          <div class="v-name">${v.name}</div>
          <span class="v-badge overdue">Overdue</span>
        </div>`;
      });
      html += '</div>';
    }
    html += '</div>';

    if (growthList.length>0) {
      const g = growthList[0];
      const gd = g.date?.seconds ? new Date(g.date.seconds*1000).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
      html += `<div class="section">
        <div class="section-title">Latest Growth · ${gd}</div>
        ${g.weightKg?`<div class="info-row"><span class="info-label">Weight</span><span class="info-value">${g.weightKg} kg</span></div>`:''}
        ${g.heightCm?`<div class="info-row"><span class="info-label">Height</span><span class="info-value">${g.heightCm} cm</span></div>`:''}
        ${g.headCm?`<div class="info-row"><span class="info-label">Head</span><span class="info-value">${g.headCm} cm</span></div>`:''}
        <div style="font-size:11px;color:#8B938F;margin-top:6px">${growthList.length} measurements total</div>
      </div>`;
    }

    if (histList.length>0) {
      html += `<div class="section"><div class="section-title">Medical History</div>`;
      histList.slice(0,5).forEach(h=>{
        const hd = h.date?.seconds ? new Date(h.date.seconds*1000).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
        html += `<div style="padding:10px 0;border-bottom:1px solid #F0EDE6">
          <div style="display:flex;justify-content:space-between">
            <span style="font-size:13px;font-weight:600;color:#1C2320">${h.condition||h.title||'Record'}</span>
            <span style="font-size:11px;color:#8B938F">${hd}</span>
          </div>
          ${h.doctor?`<div style="font-size:12px;color:#5A6360">Dr. ${h.doctor}</div>`:''}
          ${h.treatment||h.notes?`<div style="font-size:12px;color:#5A6360;margin-top:2px">${h.treatment||h.notes}</div>`:''}
        </div>`;
      });
      if (histList.length>5) html+=`<div style="font-size:11px;color:#8B938F;margin-top:6px">+${histList.length-5} more in app</div>`;
      html += '</div>';
    }

    html += `<div style="background:#F5F0E8;border-radius:10px;padding:12px;font-size:12px;color:#5A6360">
      🔒 Verified by MyChild App · Valid until ${expiresAt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}
    </div>`;

    content.innerHTML = html;

  } catch(e) {
    const known = ['no_token','not_found','expired','no_child'];
    if (!known.includes(e.message)) {
      status.innerHTML += `<div class="step fail">✗ Error: ${e.message||e.toString()}</div>`;
    }
  }
</script>
</body>
</html>
