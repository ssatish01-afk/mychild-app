<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyChild Passport Test</title>
</head>
<body style="font-family:Arial;padding:20px;background:#F5F0E8;">
<div style="background:white;border-radius:16px;padding:24px;max-width:400px;margin:0 auto;">
  <h2 style="color:#1C2320;">MyChild</h2>
  <p style="color:#5A6360;margin-top:8px;">Health Passport</p>
  <hr style="margin:16px 0;">
  <div id="token" style="background:#F5F0E8;border-radius:8px;padding:12px;font-size:13px;word-break:break-all;"></div>
  <div id="status" style="margin-top:12px;font-size:13px;color:#5A6360;"></div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const t = params.get('t');
  document.getElementById('token').innerHTML = t 
    ? '<b>Token found:</b><br>' + t.substring(0,50) + '...'
    : '<b style="color:red">No token in URL</b>';
  document.getElementById('status').innerHTML = 'Page loaded at: ' + new Date().toLocaleTimeString();
</script>
</body>
</html>
