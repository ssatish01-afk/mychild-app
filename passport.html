<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyChild Health Passport</title>
<!-- Firebase SDK (compat version - works without ES modules) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial, sans-serif; background:#F5F0E8; min-height:100vh; padding:16px; }
  .card { background:white; border-radius:20px; padding:24px; max-width:480px;
          margin:0 auto; box-shadow:0 4px 24px rgba(0,0,0,0.08); }
  .step { padding:8px 12px; margin:4px 0; border-radius:8px; font-size:13px; }
  .pending { background:#F5F0E8; color:#5A6360; }
  .ok      { background:#D4EDD4; color:#2A5A2A; }
  .fail    { background:#FCEAEA; color:#A04230; word-break:break-all; }
  .header  { background:#1C2320; border-radius:14px; padding:20px;
             margin-bottom:16px; color:white; }
  .app-name  { font-size:20px; font-weight:800; }
  .app-sub   { font-size:11px; color:rgba(255,255,255,0.5); }
  .child-name{ font-size:26px; font-weight:800; margin-top:12px; }
  .child-meta{ font-size:12px; color:rgba(255,255,255,0.65); margin-top:4px; }
  .badge { display:inline-block; background:#1D9E75; color:white; font-size:11px;
           padding:3px 10px; border-radius:20px; margin-top:8px; }
  .section { margin-bottom:16px; }
  .stitle  { font-size:10px; font-weight:700; letter-spacing:1.2px; color:#8B938F;
             text-transform:uppercase; margin-bottom:8px; }
  .row { display:flex; justify-content:space-between; padding:7px 0;
         border-bottom:1px solid #F0EDE6; }
  .lbl { font-size:13px; color:#5A6360; }
  .val { font-size:13px; font-weight:600; color:#1C2320; }
  .stats { display:flex; gap:8px; margin:8px 0; }
  .stat  { flex:1; background:#F5F0E8; border-radius:10px; padding:8px; text-align:center; }
  .snum  { font-size:18px; font-weight:800; color:#1C2320; }
  .slbl  { font-size:10px; color:#8B938F; }
  .pbar  { background:#F0EDE6; border-radius:4px; height:6px; margin:8px 0; overflow:hidden; }
  .pfill { height:100%; background:#1D9E75; border-radius:4px; }
  .vitem { display:flex; align-items:center; gap:8px; padding:7px 0;
           border-bottom:1px solid #F0EDE6; }
  .vdot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .vname { font-size:13px; color:#1C2320; flex:1; }
  .vdate { font-size:11px; color:#8B938F; }
  .hitem { padding:8px 0; border-bottom:1px solid #F0EDE6; }
  .footer{ text-align:center; font-size:11px; color:#8B938F;
           margin-top:16px; padding-top:12px; border-top:1px solid #F0EDE6; }
  .note  { background:#F5F0E8; border-radius:10px; padding:12px;
           font-size:12px; color:#5A6360; margin-top:8px; }
</style>
</head>
<body>
<div class="card">
  <div id="status"></div>
  <div id="content"></div>
  <div class="footer">
    Generated by MyChild App · Valid for 30 minutes<br>
    <a href="https://ssatish01-afk.github.io/mychild-app/privacy_policy.html"
       style="color:#1D9E75;">Privacy Policy</a>
  </div>
</div>

<script>
  const statusEl  = document.getElementById('status');
  const contentEl = document.getElementById('content');

  function addStep(id, text, type) {
    let el = document.getElementById(id);
    if (!el) { el = document.createElement('div'); el.id = id; statusEl.appendChild(el); }
    el.className = 'step ' + type;
    el.textContent = text;
  }

  function fmtDate(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts.seconds * 1000);
    return d.toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'});
  }

  async function loadPassport() {
    try {
      addStep('s1', '✓ Page loaded', 'ok');

      // Get token from URL
      const params = new URLSearchParams(window.location.search);
      let raw = params.get('t');
      if (!raw) { addStep('s2','✗ No token in URL','fail'); return; }

      let token = raw;
      try { const p = JSON.parse(decodeURIComponent(raw)); token = p.token || raw; } catch(_) {}
      addStep('s2', '✓ Token found: ' + token.substring(0,25) + '...', 'ok');

      // Init Firebase
      addStep('s3', '⏳ Connecting to Firebase...', 'pending');
      const app = firebase.initializeApp({
        apiKey: "AIzaSyAYp9WpYrqOlGHcn6vcJEb7gxT91_HduPs",
        authDomain: "child-health-passport.firebaseapp.com",
        projectId: "child-health-passport",
        storageBucket: "child-health-passport.firebasestorage.app",
        messagingSenderId: "387891334117",
        appId: "1:387891334117:web:7ccdd29d94b0009c12fd0c"
      });
      const db   = firebase.firestore();
      const auth = firebase.auth();
      addStep('s3', '✓ Firebase connected', 'ok');

      // Sign in anonymously
      addStep('s4', '⏳ Authenticating...', 'pending');
      await auth.signInAnonymously();
      addStep('s4', '✓ Authenticated', 'ok');

      // Verify token
      addStep('s5', '⏳ Verifying token...', 'pending');
      const tokenDoc = await db.collection('accessTokens').doc(token).get();
      if (!tokenDoc.exists) { addStep('s5','✗ Token not found','fail'); return; }

      const tokenData = tokenDoc.data();
      const expiresAt = tokenData.expiresAt.toDate();
      if (new Date() > expiresAt) {
        addStep('s5','✗ QR code expired. Please generate a new one.','fail'); return;
      }
      addStep('s5', '✓ Token valid', 'ok');

      // Load child data
      addStep('s6', '⏳ Loading child data...', 'pending');
      const childId  = tokenData.childId;
      const childDoc = await db.collection('children').doc(childId).get();
      if (!childDoc.exists) { addStep('s6','✗ Child not found','fail'); return; }
      const child = childDoc.data();
      addStep('s6', '✓ Loaded: ' + child.fullName, 'ok');

      // Load health data
      addStep('s7', '⏳ Loading health records...', 'pending');
      const [vaccSnap, growthSnap, histSnap] = await Promise.all([
        db.collection('children').doc(childId).collection('vaccines').get(),
        db.collection('children').doc(childId).collection('growthEntries').get(),
        db.collection('children').doc(childId).collection('medicalHistory').get(),
      ]);

      const vaccines = vaccSnap.docs.map(d => d.data());
      vaccines.sort((a,b) => (a.scheduledAgeMonths||0)-(b.scheduledAgeMonths||0));

      const growth = growthSnap.docs.map(d => d.data());
      growth.sort((a,b) => (b.date?.seconds||0)-(a.date?.seconds||0));

      const history = histSnap.docs.map(d => d.data());
      history.sort((a,b) => (b.date?.seconds||0)-(a.date?.seconds||0));

      addStep('s7', `✓ ${vaccines.length} vaccines · ${growth.length} growth · ${history.length} history`, 'ok');

      // Hide status steps and show passport
      statusEl.style.display = 'none';

      // Calculate age
      const dob    = child.dateOfBirth.toDate();
      const ageMs  = Date.now() - dob.getTime();
      const yrs    = Math.floor(ageMs/(365.25*24*3600*1000));
      const mos    = Math.floor((ageMs%(365.25*24*3600*1000))/(30.44*24*3600*1000));
      const ageStr = yrs>0 ? yrs+'y '+mos+'m' : mos+' months';

      const done    = vaccines.filter(v=>v.status==='done').length;
      const overdue = vaccines.filter(v=>v.status==='overdue').length;
      const total   = vaccines.length;
      const pct     = total>0 ? Math.round(done/total*100) : 0;

      let html = `
      <div class="header">
        <div class="app-name">MyChild</div>
        <div class="app-sub">Health Passport</div>
        <div class="child-name">${child.fullName}</div>
        <div class="child-meta">${ageStr} · ${child.sex==='M'?'Boy':'Girl'}${child.bloodGroup?' · '+child.bloodGroup:''}</div>
        <div class="badge">✓ Verified Passport</div>
      </div>

      <div class="section">
        <div class="stitle">Child Information</div>
        <div class="row"><span class="lbl">Full Name</span><span class="val">${child.fullName}</span></div>
        <div class="row"><span class="lbl">Date of Birth</span>
          <span class="val">${dob.toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'})}</span></div>
        <div class="row"><span class="lbl">Age</span><span class="val">${ageStr}</span></div>
        ${child.bloodGroup?`<div class="row"><span class="lbl">Blood Group</span><span class="val">${child.bloodGroup}</span></div>`:''}
        <div class="row"><span class="lbl">Passport ID</span><span class="val" style="font-size:11px">${child.uniqueId||'—'}</span></div>
      </div>

      <div class="section">
        <div class="stitle">Immunisation</div>
        <div class="stats">
          <div class="stat"><div class="snum" style="color:#1D9E75">${done}</div><div class="slbl">Given</div></div>
          <div class="stat"><div class="snum" style="color:#E88080">${overdue}</div><div class="slbl">Overdue</div></div>
          <div class="stat"><div class="snum">${total-done-overdue}</div><div class="slbl">Upcoming</div></div>
          <div class="stat"><div class="snum">${pct}%</div><div class="slbl">Complete</div></div>
        </div>
        <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>`;

      const doneVacc = vaccines.filter(v=>v.status==='done').slice(-8);
      if (doneVacc.length>0) {
        html += `<div style="margin-top:10px"><div class="stitle">Recently Given</div>`;
        doneVacc.forEach(v => {
          html += `<div class="vitem">
            <div class="vdot" style="background:#1D9E75"></div>
            <div class="vname">${v.name}</div>
            <div class="vdate">${fmtDate(v.completedDate)}</div>
          </div>`;
        });
        html += '</div>';
      }

      const ovList = vaccines.filter(v=>v.status==='overdue').slice(0,5);
      if (ovList.length>0) {
        html += `<div style="margin-top:8px"><div class="stitle">Overdue (${overdue})</div>`;
        ovList.forEach(v => {
          html += `<div class="vitem">
            <div class="vdot" style="background:#E88080"></div>
            <div class="vname">${v.name}</div>
          </div>`;
        });
        html += '</div>';
      }
      html += '</div>';

      // Growth
      if (growth.length>0) {
        const g = growth[0];
        html += `<div class="section">
          <div class="stitle">Latest Growth · ${fmtDate(g.date)}</div>
          ${g.weightKg?`<div class="row"><span class="lbl">Weight</span><span class="val">${g.weightKg} kg</span></div>`:''}
          ${g.heightCm?`<div class="row"><span class="lbl">Height</span><span class="val">${g.heightCm} cm</span></div>`:''}
          ${g.headCm?`<div class="row"><span class="lbl">Head Circumference</span><span class="val">${g.headCm} cm</span></div>`:''}
          <div style="font-size:11px;color:#8B938F;margin-top:4px">${growth.length} measurements recorded</div>
        </div>`;
      }

      // Medical History
      if (history.length>0) {
        html += `<div class="section"><div class="stitle">Medical History</div>`;
        history.slice(0,5).forEach(h => {
          html += `<div class="hitem">
            <div style="display:flex;justify-content:space-between">
              <span style="font-size:13px;font-weight:600;color:#1C2320">${h.condition||h.title||'Record'}</span>
              <span style="font-size:11px;color:#8B938F">${fmtDate(h.date)}</span>
            </div>
            ${h.doctor?`<div style="font-size:12px;color:#5A6360">Dr. ${h.doctor}</div>`:''}
            ${h.treatment||h.notes?`<div style="font-size:12px;color:#5A6360">${h.treatment||h.notes}</div>`:''}
          </div>`;
        });
        if (history.length>5) html += `<div style="font-size:11px;color:#8B938F;margin-top:6px">+${history.length-5} more records in app</div>`;
        html += '</div>';
      }

      html += `<div class="note">🔒 Verified by MyChild App · Valid until ${expiresAt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}</div>`;

      contentEl.innerHTML = html;

    } catch(e) {
      addStep('serr', '✗ Error: ' + (e.message||e.toString()), 'fail');
    }
  }

  loadPassport();
</script>
</body>
</html>
