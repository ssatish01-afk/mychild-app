<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MyChild Health Passport</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
  :root{
    --bg:#F4F7F2;
    --header:#4E6E5D;
    --ink:#111814;
    --muted:#3F4743;
    --subtle:#6B746F;
    --accent:#20865A;
    --accent-bg:#E9F7EE;
    --border:#E7ECE6;
    --orange:#D86422;
    --orange-bg:#FFF0E5;
    --danger:#EF6B6B;
    --danger-bg:#FFECEC;
    --blue:#1456C8;
    --blue-bg:#EFF6FF;
    --card:#FFFFFF;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    padding:10px;
  }
  .page{max-width:760px;margin:0 auto}
  .shell{
    background:rgba(255,255,255,.72);
    border:1px solid var(--border);
    border-radius:28px;
    box-shadow:0 12px 34px rgba(0,0,0,.07);
    overflow:hidden;
  }
  .top{
    background:linear-gradient(135deg,#4E6E5D,#395445);
    color:white;
    padding:20px 18px 18px;
  }
  .brand{font-size:13px;font-weight:800;letter-spacing:.7px;opacity:.78;text-transform:uppercase}
  .child-name{font-size:27px;font-weight:900;margin-top:8px;line-height:1.05}
  .child-meta{font-size:13px;margin-top:8px;color:rgba(255,255,255,.82);font-weight:650}
  .top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
  .verified{
    white-space:nowrap;
    display:inline-flex;align-items:center;gap:6px;
    padding:7px 10px;border-radius:999px;
    background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.24);
    font-size:12px;font-weight:850;
  }
  .content{padding:12px}
  .status-card{
    background:white;border:1px solid var(--border);
    border-radius:22px;padding:16px;margin-bottom:14px;
  }
  .step{padding:8px 10px;margin:5px 0;border-radius:12px;font-size:13px;font-weight:700}
  .pending{background:#F5F0E8;color:var(--muted)}
  .ok{background:var(--accent-bg);color:var(--accent)}
  .fail{background:var(--danger-bg);color:#8A2525;word-break:break-word}
  .section{
    background:white;
    border:1px solid var(--border);
    border-radius:22px;
    padding:12px;
    margin-bottom:10px;
    box-shadow:0 7px 18px rgba(0,0,0,.035);
  }
  .section-head{
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    margin-bottom:8px;
  }
  .section-title{
    display:flex;align-items:center;gap:8px;
    font-size:15px;font-weight:900;color:var(--ink);
  }
  .icon{
    width:32px;height:32px;border-radius:12px;
    display:grid;place-items:center;background:var(--accent-bg);color:var(--accent);
    font-size:18px;flex-shrink:0;
  }
  .count-badge{
    background:var(--accent-bg);
    color:var(--accent);
    border-radius:999px;
    padding:5px 9px;
    font-size:12px;
    font-weight:900;
  }
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .stat{
    background:#F8FBF8;
    border:1px solid var(--border);
    border-radius:16px;
    padding:9px 10px;
  }
  .snum{font-size:19px;font-weight:950;color:var(--ink)}
  .slbl{font-size:11px;color:var(--muted);font-weight:750;margin-top:1px}
  .row{
    display:flex;justify-content:space-between;gap:12px;
    padding:7px 0;border-bottom:1px solid #EEF2ED;
  }
  .row:last-child{border-bottom:0}
  .lbl{font-size:13px;color:var(--muted);font-weight:700}
  .val{font-size:13px;color:var(--ink);font-weight:850;text-align:right;word-break:break-word}
  .pbar{height:10px;background:#E8E6DE;border-radius:999px;overflow:hidden;margin:12px 0 4px;display:flex}
  .seg-done{background:#2EAD73}.seg-due{background:#F4BE45}.seg-overdue{background:var(--danger)}.seg-rest{background:#E8E6DE}
  .item{
    border:1px solid var(--border);
    border-radius:16px;
    padding:9px 10px;
    margin-top:6px;
    background:#FBFDFB;
  }
  .item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .item-title{font-size:13.5px;font-weight:900;color:var(--ink);line-height:1.2;min-width:0}
  .item-sub{font-size:11.5px;color:var(--muted);font-weight:650;margin-top:3px;line-height:1.28}
  .meta-line{display:flex;flex-wrap:wrap;gap:4px 8px;align-items:center}
  .meta-dot::before{content:'•';margin-right:8px;color:var(--subtle)}
  .pill{
    display:inline-flex;align-items:center;
    padding:3px 7px;border-radius:999px;font-size:10.5px;font-weight:900;
    margin-top:0;margin-right:0;
  }
  .pill.green{background:var(--accent-bg);color:var(--accent)}
  .pill.orange{background:var(--orange-bg);color:var(--orange)}
  .pill.red{background:var(--danger-bg);color:#A73737}
  .pill.blue{background:var(--blue-bg);color:var(--blue)}
  .empty{
    padding:14px;border-radius:18px;background:#F8FBF8;
    color:var(--subtle);font-size:13px;font-weight:650;border:1px dashed var(--border);
  }
  .footer{
    text-align:center;font-size:11px;color:var(--subtle);
    padding:14px 16px 18px;line-height:1.45;
  }
  .footer a{color:var(--accent);font-weight:800;text-decoration:none}
  .print-btn{
    width:100%;border:0;background:var(--header);color:white;
    border-radius:18px;padding:14px;font-size:14px;font-weight:900;
    margin-bottom:14px;
  }
  @media print{
    body{padding:0;background:white}
    .shell{box-shadow:none;border:0;border-radius:0}
    .print-btn,.footer a{display:none}
    .section{break-inside:avoid}
  }
</style>
</head>

<body>
<div class="page">
  <div class="shell">
    <div id="status" class="content">
      <div class="status-card"></div>
    </div>
    <div id="content"></div>
    <div class="footer">
      Generated by MyChild App · Temporary read-only medical view<br/>
      <a href="https://ssatish01-afk.github.io/mychild-app/privacy_policy.html">Privacy Policy</a>
    </div>
  </div>
</div>

<script>
const statusEl = document.querySelector('.status-card');
const contentEl = document.getElementById('content');

function esc(v){
  if(v === null || v === undefined || v === '') return '—';
  return String(v).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]));
}

function addStep(id,text,type){
  let el = document.getElementById(id);
  if(!el){ el=document.createElement('div'); el.id=id; statusEl.appendChild(el); }
  el.className='step '+type;
  el.textContent=text;
}

function parseDate(v){
  if(!v) return null;
  if(v.toDate) return v.toDate();
  if(v.seconds) return new Date(v.seconds*1000);
  if(typeof v === 'string') {
    const d = new Date(v);
    return isNaN(d.getTime()) ? null : d;
  }
  if(v.value && typeof v.value === 'string') {
    const d = new Date(v.value);
    return isNaN(d.getTime()) ? null : d;
  }
  return null;
}

function fmtDate(v){
  const d = parseDate(v);
  if(!d) return '—';
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}

function ageFromDob(dob){
  const d = parseDate(dob);
  if(!d) return '—';
  const now = new Date();
  let months = (now.getFullYear()-d.getFullYear())*12 + (now.getMonth()-d.getMonth());
  if(now.getDate() < d.getDate()) months--;
  const y = Math.floor(months/12);
  const m = Math.max(0, months%12);
  if(y<=0) return `${m} months`;
  if(m===0) return `${y} years`;
  return `${y} years ${m} months`;
}

function firstNonEmpty(obj, keys){
  for(const k of keys){
    if(obj && obj[k] !== undefined && obj[k] !== null && obj[k] !== '') return obj[k];
  }
  return '';
}

function statusPill(status){
  const s = (status || 'upcoming').toLowerCase();
  if(s === 'done') return `<span class="pill green">Given</span>`;
  if(s === 'overdue') return `<span class="pill red">Overdue</span>`;
  if(s === 'due') return `<span class="pill orange">Due</span>`;
  if(s === 'skipped') return `<span class="pill blue">Skipped</span>`;
  return `<span class="pill blue">Upcoming</span>`;
}

function section(title, icon, count, body){
  return `<div class="section">
    <div class="section-head">
      <div class="section-title"><span class="icon">${icon}</span><span>${title}</span></div>
      ${count !== undefined ? `<span class="count-badge">${count}</span>` : ''}
    </div>
    ${body}
  </div>`;
}

function item(title, sub, pills=''){
  return `<div class="item">
    <div class="item-top">
      <div class="item-title">${esc(title)}</div>
      ${pills ? `<div class="item-pill-wrap">${pills}</div>` : ''}
    </div>
    ${sub ? `<div class="item-sub">${sub}</div>` : ''}
  </div>`;
}

function meta(parts){
  return `<div class="meta-line">${parts.filter(Boolean).map((p,i)=>`<span class="${i>0?'meta-dot':''}">${p}</span>`).join('')}</div>`;
}

function renderPassport(tokenData){
  const pd = tokenData.passportData || {};
  const child = pd.child || {};
  const sections = pd.sections || {};

  const vaccines = sections.vaccines || [];
  const history = sections.medicalHistory || [];
  const labs = sections.labReports || [];
  const growth = sections.growth || [];
  const docs = sections.documents || [];
  const doctorVisits = sections.doctorVisits || [];

  const childName = firstNonEmpty(child, ['fullName','name']) || 'Child';
  const uniqueId = firstNonEmpty(child, ['uniqueId','id']);
  const sex = firstNonEmpty(child, ['sex']);
  const bloodGroup = firstNonEmpty(child, ['bloodGroup']);
  const dob = firstNonEmpty(child, ['dateOfBirth','dob']);
  const age = firstNonEmpty(child, ['age']) || ageFromDob(dob);

  const done = vaccines.filter(v => (v.status||'').toLowerCase()==='done').length;
  const due = vaccines.filter(v => ['due','upcoming'].includes((v.status||'').toLowerCase())).length;
  const overdue = vaccines.filter(v => (v.status||'').toLowerCase()==='overdue').length;
  const skipped = vaccines.filter(v => (v.status||'').toLowerCase()==='skipped').length;
  const total = vaccines.length;
  const pct = total ? Math.round(done/total*100) : 0;

  const doneW = total ? done : 0;
  const dueW = total ? due : 0;
  const overdueW = total ? overdue : 0;
  const skippedW = total ? skipped : 1;

  let html = `
    <div class="top">
      <div class="top-row">
        <div>
          <div class="brand">MyChild Health Passport</div>
          <div class="child-name">${esc(childName)}</div>
          <div class="child-meta">${esc(age)} · ${sex==='M'?'Boy':sex==='F'?'Girl':esc(sex)}${bloodGroup ? ' · '+esc(bloodGroup) : ''}</div>
        </div>
        <div class="verified">✓ Verified</div>
      </div>
    </div>
    <div class="content">
      <button class="print-btn" onclick="window.print()">Download / Print Report</button>

      ${section('Child Summary','👶',undefined,`
        <div class="row"><span class="lbl">Name</span><span class="val">${esc(childName)}</span></div>
        <div class="row"><span class="lbl">Passport ID</span><span class="val">${esc(uniqueId)}</span></div>
        <div class="row"><span class="lbl">Date of birth</span><span class="val">${fmtDate(dob)}</span></div>
        <div class="row"><span class="lbl">Age</span><span class="val">${esc(age)}</span></div>
        <div class="row"><span class="lbl">Blood group</span><span class="val">${esc(bloodGroup)}</span></div>
      `)}

      ${section('Vaccine Details','💉',`${done}/${total}`,`
        <div class="grid">
          <div class="stat"><div class="snum" style="color:#20865A">${done}</div><div class="slbl">Given</div></div>
          <div class="stat"><div class="snum" style="color:#D86422">${due}</div><div class="slbl">Due / Upcoming</div></div>
          <div class="stat"><div class="snum" style="color:#EF6B6B">${overdue}</div><div class="slbl">Overdue</div></div>
          <div class="stat"><div class="snum">${pct}%</div><div class="slbl">Complete</div></div>
        </div>
        <div class="pbar">
          <div class="seg-done" style="flex:${doneW}"></div>
          <div class="seg-due" style="flex:${dueW}"></div>
          <div class="seg-overdue" style="flex:${overdueW}"></div>
          <div class="seg-rest" style="flex:${skippedW}"></div>
        </div>
        ${vaccines.length ? vaccines.map(v => {
          const name = firstNonEmpty(v,['name','shortName','vaccineName']) || 'Vaccine';
          const date = v.status==='done' ? fmtDate(firstNonEmpty(v,['completedDate','givenDate'])) : fmtDate(firstNonEmpty(v,['dueDate','scheduledDate']));
          const sub = `${date !== '—' ? date : ''}${v.scheduledAgeMonths !== undefined ? ` · ${v.scheduledAgeMonths} months` : ''}`;
          return item(name, sub, statusPill(v.status));
        }).join('') : `<div class="empty">No vaccine records available.</div>`}
      `)}

      ${section('Medical History','🩺',history.length,`
        ${history.length ? history.map(h => {
          const type = firstNonEmpty(h,['type','category']);
          const title = firstNonEmpty(h,['condition','name','allergen','medicationName','treatment','title']) || type || 'Medical record';
          const date = fmtDate(firstNonEmpty(h,['date','diagnosedDate','startDate','createdAt']));
          const details = [
            type ? esc(type) : '',
            firstNonEmpty(h,['severity']) ? esc(firstNonEmpty(h,['severity'])) : '',
            firstNonEmpty(h,['reaction']) ? esc(firstNonEmpty(h,['reaction'])) : '',
            firstNonEmpty(h,['dosage']) ? esc(firstNonEmpty(h,['dosage'])) : '',
            firstNonEmpty(h,['frequency']) ? esc(firstNonEmpty(h,['frequency'])) : '',
            firstNonEmpty(h,['doctor','prescribedBy']) ? `Dr ${esc(firstNonEmpty(h,['doctor','prescribedBy']))}` : '',
            date !== '—' ? date : '',
            firstNonEmpty(h,['notes','description']) ? esc(firstNonEmpty(h,['notes','description'])) : ''
          ].filter(Boolean).join(' · ');
          const sev = String(firstNonEmpty(h,['severity'])).toLowerCase();
          const pill = sev==='severe' ? '<span class="pill red">Severe</span>' : type ? `<span class="pill green">${esc(type)}</span>` : '';
          return item(title, details, pill);
        }).join('') : `<div class="empty">No medical history records available.</div>`}
      `)}

      ${section('Lab Reports','🧪',labs.length,`
        ${labs.length ? labs.map(r => {
          const title = firstNonEmpty(r,['reportName','title','testName','name']) || 'Lab report';
          const date = fmtDate(firstNonEmpty(r,['reportDate','date','createdAt','uploadedAt']));
          const status = firstNonEmpty(r,['status','resultStatus','aiStatus']);
          const details = [
            date !== '—' ? date : '',
            status ? esc(status) : '',
            firstNonEmpty(r,['summary','aiSummary','analysis','notes']) ? esc(firstNonEmpty(r,['summary','aiSummary','analysis','notes'])) : '',
            firstNonEmpty(r,['fileName']) ? esc(firstNonEmpty(r,['fileName'])) : ''
          ].filter(Boolean).join(' · ');
          const pill = status ? `<span class="pill blue">${esc(status)}</span>` : '<span class="pill green">Report</span>';
          return item(title, details, pill);
        }).join('') : `<div class="empty">No lab reports available.</div>`}
      `)}

      ${section('Growth','📈',growth.length,`
        ${growth.length ? growth.slice(0,8).map(g => {
          const date = fmtDate(firstNonEmpty(g,['measurementDate','date','createdAt']));
          const parts = [
            g.weightKg !== undefined ? `${esc(g.weightKg)} kg` : '',
            g.heightCm !== undefined ? `${esc(g.heightCm)} cm` : '',
            g.bmi !== undefined ? `BMI ${esc(g.bmi)}` : '',
            firstNonEmpty(g,['bmiStatus','status']) ? esc(firstNonEmpty(g,['bmiStatus','status'])) : ''
          ].filter(Boolean).join(' · ');
          return item(date, parts, '<span class="pill green">Measurement</span>');
        }).join('') : `<div class="empty">No growth records available.</div>`}
      `)}


      ${doctorVisits.length ? section('Doctor Visits','👨‍⚕️',doctorVisits.length,`
        ${doctorVisits.slice(0,8).map(v => {
          const title = firstNonEmpty(v,['doctorName']) ? `Dr. ${esc(firstNonEmpty(v,['doctorName']))}` : 'Doctor visit';
          const date = fmtDate(firstNonEmpty(v,['visitDate','date','createdAt']));
          const details = [
            date !== '—' ? date : '',
            firstNonEmpty(v,['clinic']) ? esc(firstNonEmpty(v,['clinic'])) : '',
            firstNonEmpty(v,['reason']) ? esc(firstNonEmpty(v,['reason'])) : '',
            firstNonEmpty(v,['diagnosis']) ? `Diagnosis: ${esc(firstNonEmpty(v,['diagnosis']))}` : ''
          ].filter(Boolean).join(' · ');
          return item(title, details, '<span class="pill green">Visit</span>');
        }).join('')}
      `) : ''}

      ${docs.length ? section('Uploaded Documents','📁',docs.length,`
        ${docs.map(d => {
          const title = firstNonEmpty(d,['title','name','fileName','documentName']) || 'Document';
          const date = fmtDate(firstNonEmpty(d,['createdAt','uploadedAt','date']));
          return item(title, date !== '—' ? `Uploaded: ${date}` : '', '<span class="pill blue">Document</span>');
        }).join('')}
      `) : ''}

      <div class="section">
        <div class="section-title"><span class="icon">🔒</span><span>Access Information</span></div>
        <div class="row"><span class="lbl">Valid until</span><span class="val">${fmtDate(tokenData.expiresAt)} ${parseDate(tokenData.expiresAt)?.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) || ''}</span></div>
        <div class="row"><span class="lbl">Access type</span><span class="val">Read-only doctor view</span></div>
      </div>
    </div>
  `;

  contentEl.innerHTML = html;
}

async function loadPassport(){
  try{
    addStep('s1','✓ Page loaded','ok');

    const params = new URLSearchParams(window.location.search);
    const token = params.get('t');
    if(!token){ addStep('s2','✗ No token in URL','fail'); return; }
    addStep('s2','✓ Token found','ok');

    addStep('s3','⏳ Connecting to Firebase...','pending');
    firebase.initializeApp({
      apiKey: "AIzaSyAYp9WpYrqOlGHcn6vcJEb7gxT91_HduPs",
      authDomain: "child-health-passport.firebaseapp.com",
      projectId: "child-health-passport",
      storageBucket: "child-health-passport.firebasestorage.app",
      messagingSenderId: "387891334117",
      appId: "1:387891334117:web:7ccdd29d94b0009c12fd0c"
    });
    const db = firebase.firestore();
    const auth = firebase.auth();
    addStep('s3','✓ Firebase connected','ok');

    addStep('s4','⏳ Authenticating...','pending');
    await auth.signInAnonymously();
    addStep('s4','✓ Authenticated','ok');

    addStep('s5','⏳ Loading passport...','pending');
    const tokenDoc = await db.collection('accessTokens').doc(token).get();
    if(!tokenDoc.exists){ addStep('s5','✗ Token not found','fail'); return; }

    const tokenData = tokenDoc.data();
    const expiresAt = parseDate(tokenData.expiresAt);
    if(tokenData.isRevoked){ addStep('s5','✗ Access has been revoked','fail'); return; }
    if(expiresAt && new Date() > expiresAt){ addStep('s5','✗ QR code expired. Please generate a new one.','fail'); return; }

    if(!tokenData.passportData){
      addStep('s5','✗ Passport data not found. Please regenerate QR from the app.','fail');
      return;
    }

    addStep('s5','✓ Passport loaded','ok');
    document.getElementById('status').style.display='none';
    renderPassport(tokenData);

  }catch(e){
    addStep('serr','✗ Error: '+(e.message || e.toString()),'fail');
  }
}

loadPassport();
</script>
</body>
</html>
