<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyChild Health Passport</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial, sans-serif; background: #F5F0E8;
         min-height: 100vh; padding: 16px; }
  .card { background: white; border-radius: 20px; padding: 24px;
          max-width: 480px; margin: 0 auto;
          box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .header { background: #1C2320; border-radius: 14px; padding: 20px;
            margin-bottom: 20px; color: white; }
  .app-name { font-size: 22px; font-weight: 800; }
  .app-sub  { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 2px; }
  .child-name { font-size: 28px; font-weight: 800; margin-top: 14px; }
  .child-meta { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 4px; }
  .badge { display:inline-block; background: #1D9E75; color: white;
           font-size: 11px; padding: 3px 10px; border-radius: 20px;
           margin-top: 8px; }
  .section { margin-bottom: 18px; }
  .section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
                   color: #8B938F; text-transform: uppercase;
                   margin-bottom: 10px; }
  .info-row { display: flex; justify-content: space-between;
              padding: 8px 0; border-bottom: 1px solid #F0EDE6; }
  .info-label { font-size: 13px; color: #5A6360; }
  .info-value { font-size: 13px; font-weight: 600; color: #1C2320; }
  .vaccine-item { display: flex; align-items: center; gap: 10px;
                  padding: 8px 0; border-bottom: 1px solid #F0EDE6; }
  .v-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .v-name { font-size: 13px; color: #1C2320; flex: 1; }
  .v-date { font-size: 11px; color: #8B938F; }
  .v-status { font-size: 11px; font-weight: 600; padding: 2px 8px;
              border-radius: 10px; }
  .done { background: #D4EDD4; color: #2A5A2A; }
  .overdue { background: #FCEAEA; color: #A04230; }
  .upcoming { background: #F0EDE6; color: #5A6360; }
  .loading { text-align: center; padding: 40px; color: #8B938F; }
  .error { background: #FCEAEA; border-radius: 12px; padding: 16px;
           color: #A04230; text-align: center; font-size: 13px; }
  .expired { background: #FEF3E7; border-radius: 12px; padding: 16px;
             color: #8B4A10; text-align: center; }
  .footer { text-align: center; font-size: 11px; color: #8B938F;
            margin-top: 20px; padding-top: 16px;
            border-top: 1px solid #F0EDE6; }
  .progress-bar { background: #F0EDE6; border-radius: 4px;
                  height: 6px; margin-top: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: #1D9E75;
                   border-radius: 4px; transition: width 0.5s; }
  .stats { display: flex; gap: 12px; margin-top: 10px; }
  .stat { flex: 1; background: #F5F0E8; border-radius: 10px;
          padding: 10px; text-align: center; }
  .stat-num { font-size: 20px; font-weight: 800; color: #1C2320; }
  .stat-lbl { font-size: 10px; color: #8B938F; margin-top: 2px; }
</style>
</head>
<body>
<div class="card">
  <div id="content"><div class="loading">🔍 Verifying passport...</div></div>
  <div class="footer">
    Generated by MyChild App · Valid for 30 minutes<br>
    <a href="https://ssatish01-afk.github.io/mychild-app/privacy_policy.html"
       style="color:#1D9E75;">Privacy Policy</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
  import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
  import { getFirestore, doc, getDoc, collection,
           query, where, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyAYp9WpYrqOlGHcn6vcJEb7gxT91_HduPs",
    authDomain: "child-health-passport.firebaseapp.com",
    projectId: "child-health-passport",
    storageBucket: "child-health-passport.firebasestorage.app",
    messagingSenderId: "387891334117",
    appId: "1:387891334117:web:7ccdd29d94b0009c12fd0c"
  };

  const el = document.getElementById('content');

  try {
    // Get token from URL
    const params  = new URLSearchParams(window.location.search);
    const rawToken = params.get('t');

    if (!rawToken) {
      el.innerHTML = '<div class="error">⚠️ Invalid passport link. Please generate a new QR code from the MyChild app.</div>';
      throw new Error('No token');
    }

    // Parse token (may be JSON encoded)
    let token = rawToken;
    try {
      const parsed = JSON.parse(rawToken);
      token = parsed.token || rawToken;
    } catch(_) {}

    // Init Firebase
    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // Sign in anonymously to access Firestore
    const auth = getAuth(app);
    await signInAnonymously(auth);

    // Verify token
    const tokenDoc = await getDoc(doc(db, 'accessTokens', token));
    if (!tokenDoc.exists()) {
      el.innerHTML = '<div class="error">⚠️ Passport not found. Please generate a new QR code from the MyChild app.</div>';
      throw new Error('Token not found');
    }

    const tokenData = tokenDoc.data();

    // Check expiry
    const expiresAt = tokenData.expiresAt?.toDate?.() || new Date(tokenData.expiresAt);
    if (new Date() > expiresAt) {
      el.innerHTML = `<div class="expired">
        ⏰ <strong>This passport has expired.</strong><br><br>
        Please ask the parent to generate a new QR code from the MyChild app.
        QR codes are valid for 30 minutes.
      </div>`;
      throw new Error('Token expired');
    }

    const childId = tokenData.childId;

    // Fetch child data
    const childDoc = await getDoc(doc(db, 'children', childId));
    if (!childDoc.exists()) {
      el.innerHTML = '<div class="error">⚠️ Child profile not found.</div>';
      throw new Error('Child not found');
    }

    const child = childDoc.data();
    const dob   = child.dateOfBirth?.toDate?.() || new Date(child.dateOfBirth);
    const now   = new Date();
    const ageMs = now - dob;
    const years = Math.floor(ageMs / (365.25 * 24 * 60 * 60 * 1000));
    const months = Math.floor((ageMs % (365.25 * 24 * 60 * 60 * 1000)) /
                              (30.44 * 24 * 60 * 60 * 1000));
    const ageStr = years > 0
      ? `${years}y ${months}m` : `${months} months`;

    // Fetch vaccines
    const vaccinesSnap = await getDocs(
      collection(db, 'children', childId, 'vaccines')
    );
    const vaccines = [];
    vaccinesSnap.forEach(d => vaccines.push({id: d.id, ...d.data()}));
    vaccines.sort((a, b) => (a.scheduledAgeMonths||0) - (b.scheduledAgeMonths||0));

    const done     = vaccines.filter(v => v.status === 'done').length;
    const overdue  = vaccines.filter(v => v.status === 'overdue').length;
    const upcoming = vaccines.filter(v => v.status === 'upcoming').length;
    const total    = vaccines.length;
    const pct      = total > 0 ? Math.round((done / total) * 100) : 0;

    // Check permissions
    const perms = tokenData.permissions || {};

    // Build HTML
    let html = `
      <div class="header">
        <div class="app-name">MyChild</div>
        <div class="app-sub">Health Passport</div>
        <div class="child-name">${child.fullName || 'Child'}</div>
        <div class="child-meta">
          ${ageStr} · ${child.sex === 'M' ? 'Boy' : 'Girl'}
          ${child.bloodGroup ? ' · ' + child.bloodGroup : ''}
        </div>
        <div class="badge">✓ Verified Passport</div>
      </div>`;

    // Basic info
    html += `<div class="section">
      <div class="section-title">Child Information</div>
      <div class="info-row">
        <span class="info-label">Full Name</span>
        <span class="info-value">${child.fullName}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Date of Birth</span>
        <span class="info-value">${dob.toLocaleDateString('en-IN', {day:'numeric',month:'long',year:'numeric'})}</span>
      </div>
      <div class="info-row">
        <span class="info-label">Age</span>
        <span class="info-value">${ageStr}</span>
      </div>
      ${child.bloodGroup ? `<div class="info-row">
        <span class="info-label">Blood Group</span>
        <span class="info-value">${child.bloodGroup}</span>
      </div>` : ''}
      <div class="info-row">
        <span class="info-label">Passport ID</span>
        <span class="info-value" style="font-size:11px;">${child.uniqueId || '—'}</span>
      </div>
    </div>`;

    // Immunisation summary
    if (perms.vaccines !== false) {
      html += `<div class="section">
        <div class="section-title">Immunisation Status</div>
        <div class="stats">
          <div class="stat"><div class="stat-num" style="color:#1D9E75">${done}</div><div class="stat-lbl">Given</div></div>
          <div class="stat"><div class="stat-num" style="color:#E67E22">${overdue}</div><div class="stat-lbl">Overdue</div></div>
          <div class="stat"><div class="stat-num" style="color:#5A6360">${upcoming}</div><div class="stat-lbl">Upcoming</div></div>
          <div class="stat"><div class="stat-num">${pct}%</div><div class="stat-lbl">Complete</div></div>
        </div>
        <div class="progress-bar" style="margin-top:12px;">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>`;

      // Show recent done vaccines
      const doneVaccines = vaccines.filter(v => v.status === 'done').slice(-10);
      if (doneVaccines.length > 0) {
        html += `<div style="margin-top:14px;">
          <div class="section-title">Recently Given</div>`;
        doneVaccines.forEach(v => {
          const date = v.completedDate?.toDate?.();
          const dateStr = date ? date.toLocaleDateString('en-IN',
            {day:'numeric', month:'short', year:'numeric'}) : '—';
          html += `<div class="vaccine-item">
            <div class="v-dot" style="background:#1D9E75"></div>
            <div class="v-name">${v.name}</div>
            <div class="v-date">${dateStr}</div>
            <span class="v-status done">Given</span>
          </div>`;
        });
        html += '</div>';
      }

      // Show overdue vaccines
      const overdueVaccines = vaccines.filter(v => v.status === 'overdue');
      if (overdueVaccines.length > 0) {
        html += `<div style="margin-top:14px;">
          <div class="section-title">Overdue (${overdueVaccines.length})</div>`;
        overdueVaccines.slice(0, 5).forEach(v => {
          html += `<div class="vaccine-item">
            <div class="v-dot" style="background:#E88080"></div>
            <div class="v-name">${v.name}</div>
            <span class="v-status overdue">Overdue</span>
          </div>`;
        });
        html += '</div>';
      }
      html += '</div>';
    }

    // Footer note
    html += `<div style="background:#F5F0E8;border-radius:10px;padding:12px;margin-top:4px;font-size:12px;color:#5A6360;">
      🔒 This passport was generated by the parent using the MyChild app.
      Valid until ${expiresAt.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'})}.
    </div>`;

    el.innerHTML = html;

  } catch(e) {
    if (e.message !== 'No token' && e.message !== 'Token not found' &&
        e.message !== 'Token expired' && e.message !== 'Child not found') {
      el.innerHTML = `<div class="error">
        ⚠️ Could not load passport.<br><br>
        <small>${e.message}</small>
      </div>`;
    }
  }
</script>
</body>
</html>
