<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyChild Health Passport</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial, sans-serif; background: #F5F0E8; min-height: 100vh;
         display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: white; border-radius: 20px; padding: 32px 28px;
          max-width: 400px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.1); }
  .logo { font-size: 24px; font-weight: 800; color: #1C2320; margin-bottom: 4px; }
  .sub  { font-size: 13px; color: #8B938F; margin-bottom: 24px; }
  .badge { display:inline-block; background:#1D9E75; color:white; font-size:12px;
           padding: 3px 12px; border-radius: 20px; margin-bottom: 20px; }
  .info { background: #F5F0E8; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .label { font-size: 10px; font-weight: 700; letter-spacing: 1px;
           color: #8B938F; text-transform: uppercase; margin-bottom: 4px; }
  .value { font-size: 16px; font-weight: 700; color: #1C2320; }
  .expired { background: #FCEAEA; border-radius: 12px; padding: 16px;
             text-align: center; color: #A04230; }
  .loading { text-align: center; color: #8B938F; padding: 40px; }
  .footer { text-align: center; font-size: 11px; color: #8B938F; margin-top: 20px; }
  .secure { display:flex; align-items:center; gap:6px; font-size:11px;
            color: #3F6B3A; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">MyChild</div>
  <div class="sub">Health Passport</div>
  <div id="content" class="loading">Verifying passport...</div>
  <div class="footer">This passport was generated by the MyChild app.<br>
    Valid for 30 minutes from generation.</div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('t');
  const el     = document.getElementById('content');

  if (!token) {
    el.innerHTML = '<div class="expired">⚠️ Invalid passport link.<br>Please generate a new QR code from the MyChild app.</div>';
  } else {
    // In production this would call Firebase to verify token
    // For now show a message to open the app
    el.innerHTML = `
      <span class="badge">✓ Scanned</span>
      <div class="info">
        <div class="label">Passport Token</div>
        <div class="value" style="font-size:12px;word-break:break-all;">${token.substring(0,30)}...</div>
      </div>
      <div class="info">
        <div class="label">Status</div>
        <div class="value" style="color:#1D9E75;">✓ Valid QR Code</div>
      </div>
      <div class="info">
        <div class="label">Note</div>
        <div class="value" style="font-size:13px;font-weight:400;">
          To view the complete health passport with all records, 
          please ask the parent to share the full passport PDF from their MyChild app.
        </div>
      </div>
      <div class="secure">
        🔒 Secured by MyChild · Data stored in Firebase India
      </div>
    `;
  }
</script>
</body>
</html>
